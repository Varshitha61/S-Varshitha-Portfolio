    <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cream: #fdfbf7;
            --green: #dfad27;
            --pink: #de3e53;
            --black: #0a0a0a;
            --green-dark: #c69214;
            --pink-dark: #c53043;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading {
            font-family: 'Cormorant Garamond', serif;
        }

        .font-sans-modern {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(104, 211, 145, 0.2);
        }

        .text-gradient {
            background: linear-gradient(90deg, var(--pink), var(--green), var(--cream), var(--pink), var(--green));
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
        }

        @keyframes gradient-shift {

            0%,
            100% {
                background-position: 0% center;
            }

            50% {
                background-position: 100% center;
            }
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--green);
        }

        ::selection {
            background: var(--pink);
            color: var(--black);
        }

        .image-frame {
            clip-path: inset(0 0 0 0);
            transition: clip-path 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Grainy Noise Overlay */
        .noise::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
